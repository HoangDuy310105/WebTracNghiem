<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400">
  <!-- Background -->
  <rect fill="#667eea" width="500" height="400"/>
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="60" fill="rgba(255,255,255,0.1)"/>
  <circle cx="400" cy="300" r="80" fill="rgba(255,255,255,0.1)"/>
  
  <!-- Computer/Exam illustration -->
  <g transform="translate(150, 100)">
    <!-- Monitor -->
    <rect x="0" y="0" width="200" height="140" rx="10" fill="#fff"/>
    <rect x="10" y="10" width="180" height="110" fill="#e0e7ff"/>
    
    <!-- Screen content (checkmarks) -->
    <circle cx="50" cy="50" r="8" fill="#4ade80"/>
    <path d="M 45 50 L 48 53 L 55 46" stroke="#fff" stroke-width="2" fill="none"/>
    
    <circle cx="50" cy="80" r="8" fill="#4ade80"/>
    <path d="M 45 80 L 48 83 L 55 76" stroke="#fff" stroke-width="2" fill="none"/>
    
    <rect x="70" y="45" width="100" height="10" rx="5" fill="#c7d2fe"/>
    <rect x="70" y="75" width="100" height="10" rx="5" fill="#c7d2fe"/>
    
    <!-- Monitor stand -->
    <rect x="85" y="140" width="30" height="20" fill="#e2e8f0"/>
    <rect x="60" y="160" width="80" height="5" rx="2" fill="#cbd5e1"/>
  </g>
  
  <!-- Floating elements -->
  <g opacity="0.8">
    <text x="80" y="250" font-family="Arial" font-size="40" fill="#fff">📝</text>
    <text x="350" y="100" font-family="Arial" font-size="35" fill="#fff">✓</text>
    <text x="380" y="180" font-family="Arial" font-size="30" fill="#fff">📊</text>
  </g>
</svg>
