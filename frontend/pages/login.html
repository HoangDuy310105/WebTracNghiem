<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - Thi Trắc Nghiệm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <div class="auth-container">
        <div class="container">
            <div class="auth-card">
                <div class="text-center mb-4">
                    <i class="fas fa-graduation-cap fa-3x text-primary mb-3"></i>
                    <h2 class="fw-bold">Đăng Nhập</h2>
                    <p class="text-muted">Chào mừng bạn trở lại!</p>
                </div>

                <form id="loginForm">
                    <div class="mb-3">
        <label for="txtUserName" class="form-label">
            <i class="fas fa-user"></i> UserName
        </label>
        <input type="text" class="form-control" id="txtUserName" placeholder="Nhập username" required>
    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">
                            <i class="fas fa-envelope"></i> Email
                        </label>
                        <input type="email" class="form-control" id="email" placeholder="Nhập email" required>
                    </div>

                        <div class="mb-3">
        <label for="txtpassword" class="form-label">
            <i class="fas fa-lock"></i> Password
        </label>
        <input type="password" class="form-control" id="txtpassword" placeholder="Nhập password" required>
    </div>
    <div class="d-grid gap-2 mb-3">
        <button type="submit" class="btn btn-primary" id="btnlogin">Login</button>
    </div>
    <!-- Kết thúc đoạn code sửa của B -->


                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="remember">
                        <label class="form-check-label" for="remember">Ghi nhớ đăng nhập</label>
                    </div>

                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt"></i> Đăng nhập
                        </button>
                    </div>

                    <div class="text-center">
                        <p class="mb-0">Chưa có tài khoản? 
                            <a href="register.html" class="text-decoration-none fw-bold">Đăng ký ngay</a>
                        </p>
                        <a href="../index.html" class="text-muted small">
                            <i class="fas fa-arrow-left"></i> Về trang chủ
                        </a>
                    </div>
                </form>

                <!-- Alert placeholder -->
                <div id="alertPlaceholder" class="mt-3"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
