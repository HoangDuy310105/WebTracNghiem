<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - ExamPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/dark-theme.css">
</head>

<body>
    <div class="page-bg"></div>

    <!-- Decorative orbs -->
    <div
        style="position:fixed;top:-100px;right:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(99,102,241,0.15),transparent 70%);pointer-events:none;z-index:0;">
    </div>
    <div
        style="position:fixed;bottom:-100px;left:-100px;width:350px;height:350px;border-radius:50%;background:radial-gradient(circle,rgba(139,92,246,0.1),transparent 70%);pointer-events:none;z-index:0;">
    </div>

    <div class="auth-wrapper">
        <div style="position:relative;z-index:1;width:100%;max-width:460px;">
            <!-- Back home -->
            <a href="../index.html"
                style="display:inline-flex;align-items:center;gap:8px;color:var(--text-3);font-size:0.82rem;font-weight:600;text-decoration:none;margin-bottom:24px;transition:color 0.2s;"
                onmouseover="this.style.color='var(--text-2)'" onmouseout="this.style.color='var(--text-3)'">
                <i class="fas fa-arrow-left"></i> Về trang chủ
            </a>

            <div class="auth-card">
                <div class="auth-logo"><i class="fas fa-graduation-cap"></i></div>
                <div class="auth-title">Chào mừng trở lại</div>
                <div class="auth-sub">Đăng nhập vào tài khoản <strong style="color:var(--text-2);">ExamPro</strong> của
                    bạn</div>

                <div id="alertBox"
                    style="display:none;padding:12px 16px;border-radius:10px;margin-bottom:20px;font-size:0.84rem;font-weight:500;">
                </div>

                <form id="loginForm">
                    <div class="mb-form">
                        <label class="form-label">Email</label>
                        <div class="input-group">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="email" class="form-input" placeholder="example@email.com" required
                                autocomplete="email">
                        </div>
                    </div>

                    <div class="mb-form">
                        <label class="form-label">Mật khẩu</label>
                        <div class="input-group">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="password" class="form-input" placeholder="Nhập mật khẩu của bạn"
                                required autocomplete="current-password" style="padding-right:44px;">
                            <span class="input-action" id="togglePwd"><i class="fas fa-eye" id="eyeIcon"></i></span>
                        </div>
                    </div>

                    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;">
                        <label
                            style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.82rem;color:var(--text-3);">
                            <input type="checkbox" id="remember" style="accent-color:var(--primary);"> Ghi nhớ đăng nhập
                        </label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full btn-lg" id="loginBtn">
                        <i class="fas fa-sign-in-alt"></i> Đăng nhập
                    </button>

                    <div style="text-align:center;margin-top:20px;">
                        <span style="font-size:0.85rem;color:var(--text-3);">Chưa có tài khoản? </span>
                        <a href="register.html"
                            style="font-size:0.85rem;font-weight:700;color:#a5b4fc;text-decoration:none;">Đăng ký miễn
                            phí</a>
                    </div>
                </form>
            </div>

            <!-- Tech badges -->
            <div style="display:flex;gap:8px;justify-content:center;margin-top:20px;flex-wrap:wrap;">
                <span
                    style="font-size:0.7rem;color:var(--text-3);background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:4px 10px;border-radius:20px;">🔒
                    JWT Secured</span>
                <span
                    style="font-size:0.7rem;color:var(--text-3);background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:4px 10px;border-radius:20px;">🛡️
                    SSL Encrypted</span>
                <span
                    style="font-size:0.7rem;color:var(--text-3);background:rgba(255,255,255,0.04);border:1px solid var(--border);padding:4px 10px;border-radius:20px;">⚡
                    Node.js Backend</span>
            </div>
        </div>
    </div>

    <div class="toast-stack" id="toastStack"></div>

    <script src="../js/auth.js"></script>
    <script>
        document.getElementById('togglePwd').addEventListener('click', function () {
            const p = document.getElementById('password');
            const i = document.getElementById('eyeIcon');
            p.type = p.type === 'password' ? 'text' : 'password';
            i.className = p.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
        });
    </script>
</body>

</html>
