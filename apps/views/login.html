<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - ExamPro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/dark-theme.css">
    <style>
        .visual-ornament {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 30px;
            margin: 0 auto 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: white;
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4);
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .auth-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border);
            backdrop-filter: blur(10px);
            box-shadow: none;
            max-width: 400px;
        }
    </style>
</head>

<body>
    <div class="split-wrapper">
        <!-- Left Side: Visual -->
        <div class="split-visual">
            <div class="split-visual-content" style="animation: slideInLeft 0.8s cubic-bezier(0.16, 1, 0.3, 1);">
                <div class="visual-ornament">
                    <i class="fas fa-graduation-cap"></i>
                </div>
                <h2 style="font-size: 2.5rem; font-weight: 900; line-height: 1.2; margin-bottom: 20px;">Nâng tầm tri thức cùng <span style="background: linear-gradient(135deg, var(--primary), var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">ExamPro</span></h2>
                <p style="color: var(--text-2); font-size: 1.1rem; line-height: 1.6;">Hệ thống thi trắc nghiệm hiện đại, minh bạch và hiệu quả nhất cho mọi nhà trường.</p>
            </div>
        </div>

        <!-- Right Side: Form -->
        <div class="split-form">
            <div style="width: 100%; max-width: 400px; animation: slideInRight 0.8s cubic-bezier(0.16, 1, 0.3, 1);">
                <div class="mb-5">
                    <h1 style="font-size: 1.8rem; font-weight: 800; margin-bottom: 8px;">Chào mừng trở lại!</h1>
                    <p style="color: var(--text-3); font-size: 0.9rem;">Vui lòng đăng nhập để tiếp tục.</p>
                </div>

                <div id="alertBox" style="display:none;padding:14px 16px;border-radius:12px;margin-bottom:24px;font-size:0.88rem;font-weight:500;"></div>

                <form id="loginForm">
                    <div class="mb-form" style="margin-bottom: 20px;">
                        <label class="form-label">Email</label>
                        <div class="input-group">
                            <i class="fas fa-envelope input-icon"></i>
                            <input type="email" id="email" class="form-input" placeholder="example@email.com" required>
                        </div>
                    </div>

                    <div class="mb-form" style="margin-bottom: 28px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <label class="form-label">Mật khẩu</label>
                            <a href="#" style="font-size:0.75rem;color:var(--primary);text-decoration:none;font-weight:600;">Quên mật khẩu?</a>
                        </div>
                        <div class="input-group" style="margin-top: 6px;">
                            <i class="fas fa-lock input-icon"></i>
                            <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                            <i class="fas fa-eye input-action" id="togglePwd" style="right: 14px;"></i>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-full btn-lg" style="margin-bottom: 24px;">
                        Đăng nhập ngay <i class="fas fa-arrow-right"></i>
                    </button>

                    <div style="text-align:center;">
                        <span style="font-size:0.88rem;color:var(--text-3);">Bạn chưa có tài khoản? </span>
                        <a href="register.html" style="font-size:0.88rem;font-weight:700;color:var(--primary);text-decoration:none;">Đăng ký miễn phí</a>
                    </div>
                </form>

                <div style="margin-top: 40px; text-align: center;">
                    <a href="../index.html" style="color: var(--text-3); text-decoration: none; font-size: 0.8rem; display: inline-flex; align-items: center; gap: 8px;">
                        <i class="fas fa-chevron-left"></i> Quay lại trang chủ
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        const togglePwd = document.getElementById('togglePwd');
        const pwdInput = document.getElementById('password');
        if(togglePwd && pwdInput) {
            togglePwd.addEventListener('click', () => {
                const type = pwdInput.getAttribute('type') === 'password' ? 'text' : 'password';
                pwdInput.setAttribute('type', type);
                togglePwd.classList.toggle('fa-eye');
                togglePwd.classList.toggle('fa-eye-slash');
            });
        }
    </script>
</body>

</html>
